<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artomoro Gallery - Financial Reconciliation</title>
    
    <!-- PWA Metadata -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Artomoro">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .btn {
            display: inline-block;
            background: white;
            color: #1e3a8a;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            margin: 10px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .telegram-btn {
            background: #229ED9;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Artomoro Gallery</h1>
        <p class="subtitle">Financial Reconciliation & Absensi Live</p>
        
        <p style="margin-bottom: 30px; opacity: 0.85;">
            Sistem terintegrasi untuk pengelolaan keuangan dan kehadiran secara real-time.
        </p>
        
        <a href="https://t.me/artomoro_bot" class="btn telegram-btn">
            🚀 Buka di Telegram
        </a>
        
        <br>
        <small style="opacity: 0.7; margin-top: 30px; display: block;">
            Versi PWA • Bisa di-install di Home Screen
        </small>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker Registered Successfully');
                    })
                    .catch(err => {
                        console.log('❌ Service Worker Error:', err);
                    });
            });
        }
    </script>
</body>
</html>
